<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <span class="kanji-decorative" style="
    position: absolute;
    top: 2rem;
    left: 2rem;
    font-size: 8rem;
    line-height: 1;
    display: block;
    color: hsla(10, 80%, 55%, 0.166);
    font-weight: 700;
    user-select: none;
    -webkit-text-stroke: 2px hsla(10, 80%, 55%, 0.1);
">红</span>

  <span class="kanji-decorative" style="
    position: absolute;
    bottom: 3rem;
    right: 3rem;
    font-size: 6rem;
    line-height: 1;
    display: block;
    color: hsla(10, 80%, 55%, 0.166);
    font-weight: 700;
    user-select: none;
    -webkit-text-stroke: 2px hsla(10, 80%, 55%, 0.1);
">屋</span>
  <div class="container">
    <div class="login__card">

      <!-- IZQUIERDA -->
      <section class="login__info">
        <span class="login__chinese">登录</span>

        <h1 class="login__title">
          Control total de tu restaurante,
          en un solo lugar.
        </h1>

        <p class="login__text">
          Accede rápidamente para gestionar mesas, pedidos
          y caja sin fricción.
        </p>

        <!-- FORM -->
        <form class="form">
          <div class="form__group">
            <input type="text" placeholder="Usuario">
          </div>
          <div class="form__group">
            <input type="password" placeholder="Contraseña">
          </div>
          <div class="botones">
            <button type="submit" id="loginBtn" class="btn-primary">
              Entrar
            </button>
            <button type="button" id="registerBtn" class="btn-secondary" onclick="irARegistro()">
              Crear cuenta
            </button>
          </div>
        </form>
      </section>

      <section class="register__info">
        <span class="register__chinese">创建账户</span>
        <h1 class="login__title">Crear cuenta</h1>

        <form class="form">
          <div class="form__group">
            <input type="text" placeholder="Nombre">
          </div>
          <div class="form__group">
            <input type="email" placeholder="Correo">
          </div>
          <div class="form__group">
            <input type="password" placeholder="Contraseña">
          </div>
          <button class="btn-thirdy" id="register2Btn" type="button" onclick="irALogin()">Registrarse</button>
        </form>
      </section>

      <!-- DERECHA -->
      <section class="login__visual">
        <img src="./chopsuey.png" alt="Ilustración ramen" class="login__image" style="user-select: none;">
        <img src="./TRlogo.png" alt="Techos Rojos" class="login__logo" style="user-select: none;">
      </section>
    </div>
  </div>
</body>
<script src="script.js"></script>

</html>
